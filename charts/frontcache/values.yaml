replicaCount:
  router: 1
  server: 3

image:
  repository: frontcache
  tag: dev
  pullPolicy: IfNotPresent

router:
  listen: "0.0.0.0:8081"
  label: ""
  serverPort: 8080
  service:
    type: ClusterIP
    port: 8081

server:
  listen: "0.0.0.0:8080"
  cacheDirs:
    - path: /data/cache
      size: 200MiB
      k8sSizeLimit: 250Mi
  service:
    type: ClusterIP
    port: 8080

loadgen:
  fileCount: 10
  fileSizeMB: 50
  sleepMs: 100

minio:
  rootUser: minioadmin
  rootPassword: minioadmin
  buckets:
    - test

env:
  RUST_LOG: info
  # Backend fetch limits (0 = disabled/unlimited)
  # FRONTCACHE_STORE_MAX_INFLIGHT_FETCHES: "0"
  # FRONTCACHE_STORE_MAX_REQUESTS_PER_SEC: "0"
  # FRONTCACHE_STORE_REQUESTS_BURST: "1"
  # FRONTCACHE_STORE_MAX_BYTES_PER_SEC: "0"
  # FRONTCACHE_STORE_BYTES_BURST: "16777216"
  # FRONTCACHE_STORE_LIMIT_WAIT_TIMEOUT_MS: "0"

extraEnv: []

resources: {}
