apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "frontcache.fullname" . }}-server
  labels:
    {{- include "frontcache.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  serviceName: {{ include "frontcache.fullname" . }}-server
  replicas: {{ .Values.replicaCount.server }}
  selector:
    matchLabels:
      {{- include "frontcache.serverSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "frontcache.serverSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: server
          image: {{ include "frontcache.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/frontcache-server"]
          args:
            - "--listen"
            - {{ .Values.server.listen | quote }}
            - "--cache-dirs"
            - {{ range $i, $dir := .Values.server.cacheDirs }}{{ if $i }},{{ end }}{{ $dir.path }}:{{ $dir.size }}{{ end }}
            - "--index-path"
            - "/var/lib/frontcache/index.db"
            - "--bucket-config"
            - "/etc/frontcache/buckets.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            failureThreshold: 2
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_NAME
              value: "frontcache_server"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.instance.id=$(POD_NAME)"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "frontcache.fullname" . }}-otel-collector:4317"
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.minio.rootUser | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.minio.rootPassword | quote }}
            - name: AWS_ENDPOINT
              value: "http://{{ include "frontcache.fullname" . }}-minio:9000"
            - name: AWS_ALLOW_HTTP
              value: "true"
            - name: AWS_REGION
              value: "us-east-1"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: bucket-config
              mountPath: /etc/frontcache
            - name: index
              mountPath: /var/lib/frontcache
            {{- range $i, $dir := .Values.server.cacheDirs }}
            - name: cache-{{ $i }}
              mountPath: {{ $dir.path }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: bucket-config
          configMap:
            name: {{ include "frontcache.fullname" . }}-bucket-config
        - name: index
          emptyDir: {}
        {{- range $i, $dir := .Values.server.cacheDirs }}
        - name: cache-{{ $i }}
          {{- if $dir.k8sSizeLimit }}
          emptyDir:
            sizeLimit: {{ $dir.k8sSizeLimit }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
