apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frontcache.fullname" . }}-loadgen
  labels:
    {{- include "frontcache.labels" . | nindent 4 }}
    app.kubernetes.io/component: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "frontcache.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: loadgen
  template:
    metadata:
      labels:
        {{- include "frontcache.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: loadgen
    spec:
      initContainers:
        - name: setup-buckets
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://{{ include "frontcache.fullname" . }}-minio:9000 {{ .Values.minio.rootUser }} {{ .Values.minio.rootPassword }}; do
                echo "Waiting for MinIO..."
                sleep 2
              done
              {{- range .Values.minio.buckets }}
              mc mb --ignore-existing local/{{ . }}
              {{- end }}
              echo "Buckets ready."
      containers:
        - name: loadgen
          image: {{ include "frontcache.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["frontcache-loadgen"]
          env:
            - name: ROUTER
              value: "http://{{ include "frontcache.fullname" . }}-router:{{ .Values.router.service.port }}"
            - name: FILE_COUNT
              value: {{ .Values.loadgen.fileCount | quote }}
            - name: FILE_SIZE_MB
              value: {{ .Values.loadgen.fileSizeMB | quote }}
            - name: SLEEP_MS
              value: {{ .Values.loadgen.sleepMs | quote }}
            - name: BUCKET
              value: "test"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_NAME
              value: "frontcache_client"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.instance.id=$(POD_NAME)"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "frontcache.fullname" . }}-otel-collector:4317"
