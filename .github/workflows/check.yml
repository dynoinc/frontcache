name: Check

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Setup Just
      uses: extractions/setup-just@v2

    - name: Run just check
      run: just check

    - name: Verify no unwanted changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "Error: Unwanted changes detected after running 'just check'"
          git status
          git diff
          exit 1
        fi

    - name: Generate short SHA
      id: vars
      run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-6)" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu
    steps:
    - uses: actions/checkout@v4

    - name: Install cross-compilation tools
      if: matrix.arch == 'arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        rustup target add aarch64-unknown-linux-gnu

    - name: Setup Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.arch }}

    - name: Build binaries
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
      run: cargo build --release -p frontcache-server -p frontcache-router --target ${{ matrix.target }}

    - name: Copy binaries to context root
      run: |
        cp target/${{ matrix.target }}/release/frontcache-server .
        cp target/${{ matrix.target }}/release/frontcache-router .

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: frontcache-main-${{ needs.check.outputs.short_sha }}-linux-${{ matrix.arch }}
        path: |
          frontcache-server
          frontcache-router
        retention-days: 30

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/${{ matrix.arch }}
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ needs.check.outputs.short_sha }}-${{ matrix.arch }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }},mode=max

  create-manifest:
    runs-on: ubuntu-latest
    needs: [check, build]
    steps:
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push manifest
      env:
        SHORT_SHA: ${{ needs.check.outputs.short_sha }}
      run: |
        docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${SHORT_SHA} \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${SHORT_SHA}-amd64 \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${SHORT_SHA}-arm64
